name: tuxdrive_flutter
description: Google Drive sync client for Linux
publish_to: none
version: 0.1.4

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.0
  path_provider: ^2.1.0
  url_launcher: ^6.2.0
  intl: ^0.19.0
  file_selector: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
